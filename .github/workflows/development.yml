name: Deploy Development

on:
  push:
    branches:
      - development

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          python -m pip install semgrep
          semgrep scan \
            --config p/security-audit \
            --sarif \
            --output semgrep.sarif \

      
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-fs.sarif 
          
      - name: Dockerfile scan  
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build ./backend --file backend/Dockerfile \
            -t $BACKEND_IMAGE:dev \
            -t $BACKEND_IMAGE:${{ github.sha }}

      - name: Build frontend Docker image
        run: |
          docker build ./frontend --file frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.DEV_NEXT_PUBLIC_API_URL }} \
            -t $FRONTEND_IMAGE:dev \
            -t $FRONTEND_IMAGE:${{ github.sha }}

      - name: Push backend Docker image
        run: |
          docker push $BACKEND_IMAGE:dev
          docker push $BACKEND_IMAGE:${{ github.sha }}

      - name: Push frontend Docker image
        run: |
          docker push $FRONTEND_IMAGE:dev
          docker push $FRONTEND_IMAGE:${{ github.sha }}

      - name: Deploy to Linode
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /root/url-shortner-app-dev

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            docker compose --env-file .env.dev -f docker-compose.dev.yml pull

            docker compose --env-file .env.dev -f docker-compose.dev.yml up -d

            docker image prune -f

name: Deploy Production

on:
  pull_request:
    types:
      - closed
env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend

jobs:
  deploy:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'development'

    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        run: |
          python -m pip install semgrep
          semgrep scan \
            --config p/security-audit \
            --sarif \
            --output semgrep.sarif \
            .

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy Filesystem Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-fs.sarif

      - name: Upload trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Scan Backend Dockerfile
        run: |
          docker run --rm \
          -i hadolint/hadolint \
          hadolint \
          -f sarif \
          --failure-threshold warning \
          - \
          < backend/Dockerfile > backend-hadolint.sarif || true

      - name: Backend Dockerfile scan report
        uses: actions/upload-artifact@v4
        with:
          name: backend-scan-report
          path: backend-hadolint.sarif

      - name: Upload Backend Dockerfile scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-hadolint.sarif
          category: hadolint-backend

      - name: Scan Frontend Dockerfile
        run: |
          docker run --rm \
          -i hadolint/hadolint \
          hadolint \
          -f sarif \
          --failure-threshold warning \
          - \
          < frontend/Dockerfile > frontend-hadolint.sarif || true

      - name: Frontend Dockerfile scan report
        uses: actions/upload-artifact@v4
        with:
          name: Frontend-scan-report
          path: frontend-hadolint.sarif

      - name: Upload frontend Dockerfile scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-hadolint.sarif
          category: hadolint-frontend

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build ./backend --file backend/Dockerfile \
            -t $BACKEND_IMAGE:prod \
            -t $BACKEND_IMAGE:${{ github.sha }}

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: backend-image.sarif
          severity: HIGH,CRITICAL

      - name: Upload Backend Image Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-report
          path: backend-image.sarif

      - name: Upload Backend Image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-image.sarif
          category: trivy-image-backend

      - name: Build frontend Docker image
        run: |
          docker build ./frontend --file frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.PROD_NEXT_PUBLIC_API_URL }} \
            -t $FRONTEND_IMAGE:prod \
            -t $FRONTEND_IMAGE:${{ github.sha }}

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: frontend-image.sarif
          severity: HIGH,CRITICAL

      - name: Upload Frontend Image Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-report
          path: frontend-image.sarif

      - name: Upload Frontend Image scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-image.sarif
          category: trivy-image-frontend

      - name: Push backend Docker image
        run: |
          docker push $BACKEND_IMAGE:prod
          docker push $BACKEND_IMAGE:${{ github.sha }}

      - name: Push frontend Docker image
        run: |
          docker push $FRONTEND_IMAGE:prod
          docker push $FRONTEND_IMAGE:${{ github.sha }}

      # --- Pull Tested Images ---
      # Images above were just built, scanned, and pushed under this exact
      # commit SHA. This step is the handoff point: the Linode host pulls
      # those SHA-tagged images from GHCR rather than trusting the ones it
      # already has running.
      - name: Pull Tested Images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /root/url-shortner-app-prod

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            record_prev() {
              local service="$1" outfile="$2"
              local cid
              cid=$(docker compose --env-file .env -f docker-compose.yml images -q "$service")
              if [ -z "$cid" ]; then
                : > "$outfile"
                return
              fi
              docker inspect --format '{{index .RepoDigests 0}}' "$cid" 2>/dev/null > "$outfile" || : > "$outfile"
            }
            record_prev backend backend.prev
            record_prev frontend frontend.prev

            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            docker compose --env-file .env -f docker-compose.yml pull

      # --- Deploy Production ---
      - name: Deploy Production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /root/url-shortner-app-prod

            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

            docker compose --env-file .env -f docker-compose.yml up -d

            docker image prune -f

      # --- Health Check ---
      - name: Wait for application
        run: sleep 20

      - name: Health Check
        id: health_check
        run: curl --fail https://go2url.xyz

      # --- Smoke Tests ---
      - name: Smoke Tests
        id: smoke_tests
        run: |
          curl --fail https://go2url.xyz
          curl --fail https://go2url.xyz/health
          curl --fail https://go2url.xyz/login

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://go2url.xyz"
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

      # --- Rollback (optional) ---
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            cd /root/url-shortner-app-prod

            BACKEND_PREV=$(cat backend.prev 2>/dev/null || true)
            FRONTEND_PREV=$(cat frontend.prev 2>/dev/null || true)

            if [ -z "$BACKEND_PREV" ] || [ -z "$FRONTEND_PREV" ]; then
              echo "No previous image recorded, cannot roll back automatically." >&2
              exit 1
            fi

            export BACKEND_IMAGE=$BACKEND_PREV
            export FRONTEND_IMAGE=$FRONTEND_PREV

            docker compose --env-file .env -f docker-compose.yml pull
            docker compose --env-file .env -f docker-compose.yml up -d

      - name: Generate Backend SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: cyclonedx
          output: backend-sbom.json

      - name: Upload Backend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.json

      - name: Generate Frontend SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: cyclonedx
          output: frontend-sbom.json

      - name: Upload Frontend SBOM
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: frontend-sbom.json

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  keepalive_timeout 65;

  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream backend_upstream {
    server backend:4000;
  }

  server {
    listen 80;
    server_name go2url.xyz;

    # Backend API
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend health check
    location = /health {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
    }

    # Short code redirects: any single-segment path that isn't a known
    # frontend route (e.g. /abc123) falls through to the backend, which
    # resolves and redirects. Checked before the frontend catch-all below
    # since regex locations take precedence over the "/" prefix match.
    location ~ ^/(?!login|register|dashboard)[A-Za-z0-9_-]+$ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else (/, /login, /register, /dashboard, /_next/*, static
    # assets) goes to the Next.js frontend.
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

name: url-shortener-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DEV_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${DEV_POSTGRES_DB:-urlshortener_dev}
    ports:
      - "${DEV_POSTGRES_PORT:-5433}:5432"
    volumes:
      - dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_POSTGRES_USER:-postgres} -d ${DEV_POSTGRES_DB:-urlshortener_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DEV_POSTGRES_USER:-postgres}:${DEV_POSTGRES_PASSWORD:-postgres}@db:5432/${DEV_POSTGRES_DB:-urlshortener_dev}
      PORT: 4000
      BASE_URL: ${DEV_BASE_URL:-https://dev.go2url.xyz}
      JWT_SECRET: ${DEV_JWT_SECRET:?DEV_JWT_SECRET is required}
      JWT_EXPIRES_IN: ${DEV_JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${DEV_FRONTEND_URL:-https://dev.go2url.xyz}
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${DEV_NEXT_PUBLIC_API_URL:-https://dev.go2url.xyz}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${DEV_NGINX_PORT:-8080}:80"

volumes:
  dev_db_data:
